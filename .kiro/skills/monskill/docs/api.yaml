openapi: 3.0.3
info:
  title: MONSKILLS API
  description: API for serving Monad development skills and viewing download analytics.
  version: 1.0.0
  contact:
    name: Harpalsinh Jadeja
    url: https://github.com/therealharpaljadeja/monskills

servers:
  - url: https://skills.devnads.com
    description: Production

paths:
  /api/skill:
    get:
      summary: Get a skill's markdown content
      description: |
        Returns the SKILL.md file for the requested skill.
        Also logs an anonymous download event (hashed IP + skill name) to the database.
      parameters:
        - name: name
          in: query
          required: true
          description: The skill identifier
          schema:
            type: string
            enum:
              - monskill
              - scaffold
              - why-monad
              - addresses
              - wallet
              - wallet-integration
      responses:
        "200":
          description: Skill markdown content
          headers:
            Content-Type:
              schema:
                type: string
                example: text/markdown; charset=utf-8
            Access-Control-Allow-Origin:
              schema:
                type: string
                example: "*"
            Cache-Control:
              schema:
                type: string
                example: public, s-maxage=60, stale-while-revalidate=300
          content:
            text/markdown:
              schema:
                type: string
                example: |
                  ---
                  name: scaffold
                  description: End-to-end guide from idea to production.
                  ---
                  # Scaffold
                  ...
        "404":
          description: Skill not found
          content:
            text/plain:
              schema:
                type: string
                example: Skill not found

  /api/stats:
    get:
      summary: Get download analytics
      description: |
        Returns aggregated download statistics per skill.
        Protected by a secret key passed as a query parameter.
      parameters:
        - name: key
          in: query
          required: true
          description: The stats secret key (must match STATS_SECRET env var)
          schema:
            type: string
      responses:
        "200":
          description: Analytics data
          content:
            application/json:
              schema:
                type: object
                properties:
                  totals:
                    type: array
                    items:
                      type: object
                      properties:
                        skill_name:
                          type: string
                          example: scaffold
                        downloads:
                          type: integer
                          example: 142
                  unique_visitors:
                    type: array
                    items:
                      type: object
                      properties:
                        skill_name:
                          type: string
                          example: scaffold
                        unique_visitors:
                          type: integer
                          example: 98
                  daily_last_30_days:
                    type: array
                    items:
                      type: object
                      properties:
                        skill_name:
                          type: string
                          example: scaffold
                        date:
                          type: string
                          format: date
                          example: "2026-03-18"
                        downloads:
                          type: integer
                          example: 12
        "401":
          description: Unauthorized — missing or incorrect key
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: Unauthorized
        "500":
          description: Server error — DATABASE_URL not configured
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: DATABASE_URL not configured

  /{skill}:
    get:
      summary: Skill shorthand URL
      description: |
        Convenience route that rewrites to /api/skill?name={skill}.
        Example: GET /scaffold → served by /api/skill?name=scaffold
      parameters:
        - name: skill
          in: path
          required: true
          schema:
            type: string
            enum:
              - scaffold
              - why-monad
              - addresses
              - wallet
              - wallet-integration
      responses:
        "200":
          description: Skill markdown content (same as /api/skill)
          content:
            text/markdown:
              schema:
                type: string

  /{skill}/SKILL.md:
    get:
      summary: Skill direct file URL
      description: |
        Direct path to skill file, also routed through tracking.
        Example: GET /scaffold/SKILL.md → served by /api/skill?name=scaffold
      parameters:
        - name: skill
          in: path
          required: true
          schema:
            type: string
            enum:
              - scaffold
              - why-monad
              - addresses
              - wallet
              - wallet-integration
      responses:
        "200":
          description: Skill markdown content (same as /api/skill)
          content:
            text/markdown:
              schema:
                type: string

  /SKILL.md:
    get:
      summary: Root skill index
      description: |
        Returns the master SKILL.md index file.
        Tracked as skill name "monskill".
      responses:
        "200":
          description: Master skill index markdown
          content:
            text/markdown:
              schema:
                type: string
